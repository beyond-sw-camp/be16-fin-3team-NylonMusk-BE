services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092   # 로컬 개발 기준
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
    restart: unless-stopped
    networks: [app-net]

  redis-node-1:
    image: redis:7.2
    container_name: redis-node-1
    command: ["redis-server",
              "--port", "7000",
              "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf",
              "--appendonly", "yes",
              "--cluster-announce-ip", "redis-node-1",          # 노드 간은 컨테이너 이름으로
              "--cluster-announce-hostname", "localhost",        # 클라이언트(Spring)에는 localhost 광고
              "--cluster-announce-port", "7000",
              "--cluster-announce-bus-port", "17000"]
    ports:
      - "7000:7000"
      - "17000:17000"
    networks: [app-net]

  redis-node-2:
    image: redis:7.2
    container_name: redis-node-2
    command: ["redis-server",
              "--port", "7001",
              "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf",
              "--appendonly", "yes",
              "--cluster-announce-ip", "redis-node-2",
              "--cluster-announce-hostname", "localhost",
              "--cluster-announce-port", "7001",
              "--cluster-announce-bus-port", "17001"]
    ports:
      - "7001:7001"
      - "17001:17001"
    networks: [app-net]

  redis-node-3:
    image: redis:7.2
    container_name: redis-node-3
    command: ["redis-server",
              "--port", "7002",
              "--cluster-enabled", "yes",
              "--cluster-config-file", "nodes.conf",
              "--appendonly", "yes",
              "--cluster-announce-ip", "redis-node-3",
              "--cluster-announce-hostname", "localhost",
              "--cluster-announce-port", "7002",
              "--cluster-announce-bus-port", "17002"]
    ports:
      - "7002:7002"
      - "17002:17002"
    networks: [app-net]

# docker exec -it redis-node-1 redis-cli --cluster create redis-node-1:7000 redis-node-2:7001 redis-node-3:7002 --cluster-replicas 0

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: matching_engine
    ports:
      - "3309:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks: [app-net]

networks:
  app-net:
    driver: bridge
