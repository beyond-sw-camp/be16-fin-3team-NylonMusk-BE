# ingress-controller 설치 명령어
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.1/deploy/static/provider/aws/deploy.yaml
# aws lb -> ingress controller pod -> ingress -> service로의 라우팅

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mkx-ingress
  namespace: mkx
  annotations:
  # 여기서 "nginx"로 지정한 것은 이 Ingress가 NGINX 기반 Ingress Controller에 의해 처리된다는 의미
    kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/rewrite-target: /$1 #첫번쨰 prefix제거
    
    # ✅ WebSocket 지원 설정
    nginx.ingress.kubernetes.io/websocket-services: "api-gateway-service"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    
    # WebSocket Upgrade 헤더 명시적 설정
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    
spec:
# https 프로토콜의 2가지 인증서: ssl < tls(좀 더 보안강화가 됨.)
  tls:
  - hosts:
    - "server.mk-exchange.shop"
    - "trading.mk-exchange.shop"
    - "www.trading.mk-exchange.shop"
    - "managing.mk-exchange.shop"
    # 모든 도메인에 동일한 인증서 사용 (와일드카드 또는 SAN 인증서 권장)
    secretName: server-mk-exchange-shop-tls
  
  rules:
  # server.mk-exchange.shop (기존)
  - host: server.mk-exchange.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
  
  # ✅ trading.mk-exchange.shop 추가
  - host: trading.mk-exchange.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
  
  # ✅ www.trading.mk-exchange.shop 추가
  - host: www.trading.mk-exchange.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
  
  # ✅ managing.mk-exchange.shop 추가
  - host: managing.mk-exchange.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 80
      # - path: /bradkim2/ #bradkim2으로 시작하는 모든 url요청을 nginx-service2로 라우팅한다는 정규표현식
      #   pathType: Prefix
      #   backend:
      #     service:
      #       name: nginx-service2
      #       port:
      #         number: 80